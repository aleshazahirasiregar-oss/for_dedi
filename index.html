<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Papa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%); 
            padding: 20px; 
        }
        .card { 
            background: white; padding: 40px; border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            text-align: center; max-width: 400px; width: 100%; 
            border: 1px solid #edf2f7;
        }
        h1 { color: #2d3748; margin-bottom: 20px; }
        p { color: #4a5568; line-height: 1.7; margin-bottom: 30px; font-size: 16px; }
        .btn-love { 
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%); 
            color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; 
            font-size: 16px; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.3);
        }
        .btn-love:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(49, 130, 206, 0.4); }
    </style>
</head>
<body>
    <div class="card">
        <h1>FOR MY DEAREST PAPA</h1>
        <p>"Thank you for all your hard work and the sacrifices you've made for our family. May your path always be blessed with abundant success, smooth business, and endless health. You are the strongest pillar I know."</p>
        
        <!-- Tombol mengarah ke doa.html -->
        <button class="btn-love" onclick="window.location.href='doa.html'">Send Love ❤️</button>
    </div>
</body>
</html>
